<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link rel="stylesheet" href="buynow.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="light">

<div class="checkout-wrapper container">

  <!-- NAV BUTTONS -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <button onclick="history.back()" class="nav-btn">
      ← Back
    </button>

    <a href="index.html" class="nav-btn text-decoration-none">
      Home
    </a>
  </div>

  <div class="row g-4 align-items-start">

    <!-- ORDER SUMMARY -->
    <div class="col-lg-4 order-1 order-lg-2">
      <div class="checkout-card">

        <h5 class="mb-4">Order Summary</h5>

        <div class="product-box d-flex gap-3 mb-3">
          <img src="https://th.bing.com/th/id/OPAC.1u3QErXYVkcXHA474C474?w=200&h=260&o=7&dpr=1.3&pid=1.7&rm=3" class="product-img">
          <div>
            <h6 class="mb-1">Premium Cotton Shirt</h6>
            <small>Size: M</small><br>
            <small>Qty: 1</small>
          </div>
        </div>

        <hr>

        <div class="summary-row">
          <span>Price</span>
          <span>₹999</span>
        </div>

        <div class="summary-row">
          <span>Delivery</span>
          <span>₹40</span>
        </div>

        <div class="summary-row">
          <span>Tax (5%)</span>
          <span>₹50</span>
        </div>

        <div class="summary-row text-success">
          <span>Discount</span>
          <span>- ₹100</span>
        </div>

        <hr>

        <div class="summary-row summary-total">
          <span>Total</span>
          <span>₹989</span>
        </div>

      </div>
    </div>

    <!-- SHIPPING DETAILS -->
    <div class="col-lg-8 order-2 order-lg-1">
      <div class="checkout-card">

        <h4 class="mb-4">Shipping Details</h4>

        <input class="form-control checkout-input mb-3" placeholder="Full Name">
        <input class="form-control checkout-input mb-3" placeholder="Phone Number">
        <input class="form-control checkout-input mb-3" placeholder="Address">
        <input class="form-control checkout-input mb-3" placeholder="City">
        <input class="form-control checkout-input mb-3" placeholder="Pincode">

        <button class="checkout-btn w-100 mt-3">
          Place Order
        </button>

      </div>
    </div>

  </div>
</div>

</body>
</html>
