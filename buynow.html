<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link rel="stylesheet" href="buynow.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="light">

<div class="checkout-wrapper container">

  <!-- NAV BUTTONS -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <button onclick="history.back()" class="nav-btn">
      ← Back
    </button>

    <a href="index.html" class="nav-btn text-decoration-none">
      Home
    </a>
  </div>

  <div class="row g-4 align-items-start">

    <!-- ORDER SUMMARY -->
    <div class="col-lg-4 order-1 order-lg-2">
      <div class="checkout-card">

        <h5 class="mb-4">Order Summary</h5>

       <div id="order-items"></div>

<hr>

<div class="summary-row">
  <span>Price</span>
  <span id="subtotal">₹0</span>
</div>

<div class="summary-row">
  <span>Delivery</span>
  <span id="delivery">₹40</span>
</div>

<div class="summary-row">
  <span>Tax (5%)</span>
  <span id="tax">₹0</span>
</div>

<hr>

<div class="summary-row summary-total">
  <span>Total</span>
  <span id="grand-total">₹0</span>
</div>
      </div>
    </div>

    <!-- SHIPPING DETAILS -->
    <div class="col-lg-8 order-2 order-lg-1">
      <div class="checkout-card">

        <h4 class="mb-4">Shipping Details</h4>

        <input class="form-control checkout-input mb-3" placeholder="Full Name">
        <input class="form-control checkout-input mb-3" placeholder="Phone Number">
        <input class="form-control checkout-input mb-3" placeholder="Address">
        <input class="form-control checkout-input mb-3" placeholder="City">
        <input class="form-control checkout-input mb-3" placeholder="Pincode">

        <button class="checkout-btn w-100 mt-3">
          Place Order
        </button>

      </div>
    </div>

  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let container = document.getElementById("order-items");

  let subtotal = 0;

  if(cart.length === 0){
    container.innerHTML = "<p>Your cart is empty 😕</p>";
  }

  cart.forEach(item => {

    subtotal += item.price * item.qty;

    container.innerHTML += `
      <div class="product-box d-flex gap-3 mb-3">
        <img src="${item.image}" class="product-img">
        <div>
          <h6 class="mb-1">${item.name}</h6>
          <small>Size: ${item.size}</small><br>
          <small>Qty: ${item.qty}</small><br>
          <small>₹ ${item.price}</small>
        </div>
      </div>
    `;
  });

  let delivery = 40;
  let tax = Math.round(subtotal * 0.05);
  let total = subtotal + delivery + tax;

  document.getElementById("subtotal").innerText = "₹" + subtotal;
  document.getElementById("tax").innerText = "₹" + tax;
  document.getElementById("grand-total").innerText = "₹" + total;

  // PLACE ORDER BUTTON
  document.querySelector(".checkout-btn").addEventListener("click", function(){

    let inputs = document.querySelectorAll(".checkout-input");
    let isValid = true;

    inputs.forEach(input => {
      if(input.value.trim() === ""){
        input.style.border = "1px solid red";
        isValid = false;
      } else {
        input.style.border = "1px solid #ccc";
      }
    });

    if(!isValid){
      alert("Please fill all details ⚠");
      return;
    }

    if(cart.length === 0){
      alert("Cart is empty!");
      return;
    }

    alert("Order Placed Successfully 🎉");

    localStorage.removeItem("cart"); // Clear cart
    window.location.href = "index.html";
  });

});
</script>
</body>
</html>
