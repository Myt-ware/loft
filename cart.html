<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="cart.css">

</head>

<body class="light">

<div class="container cart-wrapper">

  <!-- TOP NAV BUTTONS -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <button onclick="history.back()" class="nav-btn">
      ← Back
    </button>

    <a href="index.html" class="nav-btn text-decoration-none">
       Home
    </a>
  </div>

  <div class="row g-4">

    <!-- CART TOTAL (TOP ON MOBILE) -->
    <div class="col-lg-4 order-1 order-lg-2">
      <div class="cart-card">
        <h5 class="mb-4">Cart Summary</h5>

        <div class="summary-row">
          <span>Subtotal</span>
          <span>₹1998</span>
        </div>

        <div class="summary-row">
          <span>Delivery</span>
          <span>₹40</span>
        </div>

        <div class="summary-row text-success">
          <span>Discount</span>
          <span>- ₹100</span>
        </div>

        <hr>

        <div class="summary-row summary-total">
          <span>Total</span>
          <span>₹1938</span>
        </div>

        <a href="buynow.html" class="checkout-btn w-100 text-center mt-3">
          Proceed to Checkout
        </a>
      </div>
    </div>

    <!-- CART ITEMS -->
    <div class="col-lg-8 order-2 order-lg-1">
      <div class="cart-card">

        <h4 class="mb-4">My Cart</h4>

        <!-- Item -->
        <div class="cart-item d-flex align-items-center justify-content-between flex-wrap">

          <div class="d-flex align-items-center gap-3">
            <img src="https://th.bing.com/th/id/OPAC.1u3QErXYVkcXHA474C474?w=200&h=260&o=7&dpr=1.3&pid=1.7&rm=3" class="cart-img">
            <div>
              <h6 class="mb-1">Premium Cotton Shirt</h6>
              <small>Size: M</small><br>
              <span class="price">₹999</span>
            </div>
          </div>

          <div class="qty-box d-flex align-items-center mt-3 mt-lg-0">
            <button class="qty-btn">-</button>
            <span class="mx-3">1</span>
            <button class="qty-btn">+</button>
          </div>

          <button class="remove-btn mt-3 mt-lg-0">Remove</button>

        </div>

        <hr>

        <!-- Second Item -->
        <div class="cart-item d-flex align-items-center justify-content-between flex-wrap">

          <div class="d-flex align-items-center gap-3">
            <img src="https://th.bing.com/th/id/OPAC.1u3QErXYVkcXHA474C474?w=200&h=260&o=7&dpr=1.3&pid=1.7&rm=3" class="cart-img">
            <div>
              <h6 class="mb-1">Casual Sneakers</h6>
              <small>Size: 9</small><br>
              <span class="price">₹999</span>
            </div>
          </div>

          <div class="qty-box d-flex align-items-center mt-3 mt-lg-0">
            <button class="qty-btn">-</button>
            <span class="mx-3">1</span>
            <button class="qty-btn">+</button>
          </div>

          <button class="remove-btn mt-3 mt-lg-0">Remove</button>

        </div>

      </div>
    </div>

  </div>
</div>

</body>
</html>
